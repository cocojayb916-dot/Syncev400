<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>$ynce OS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body { font-family: 'MS Sans Serif', Arial, sans-serif; font-size: 11px; overflow: hidden; width: 100vw; height: 100vh; background: #000; }



  /* ── LOGIN SCREEN ── */
  #login {
    position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
    background: #008080; z-index: 1000;
  }
  #login .login-box {
    background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;

  }
  #login .title-bar-icon { width: 14px; height: 14px; background: #c0c0c0; border: 1px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 9px; }

  #login .welcome { font-size: 20px; font-weight: bold; text-align: center; color: #000080; margin-bottom: 6px; }
  #login .welcome-sub { font-size: 11px; text-align: center; color: #444; margin-bottom: 18px; }
  #login .field-row { display: flex; align-items: center; margin-bottom: 10px; }
  #login .field-row label { width: 90px; font-size: 11px; }
  #login .field-row input {
    flex: 1; border: 2px solid; border-color: #808080 #fff #fff #808080;
    background: #fff; padding: 2px 4px; font-size: 11px; font-family: inherit; outline: none;
  }
  #login .btn-row { display: flex; justify-content: center; gap: 8px; margin-top: 14px; }
  .win95-btn {
    background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
    padding: 3px 18px; font-size: 11px; font-family: inherit; cursor: pointer; min-width: 75px;
  }
  .win95-btn:active { border-color: #808080 #fff #fff #808080; padding: 4px 17px 2px 19px; }

  /* ── DESKTOP ── */
  #desktop {
    position: fixed; inset: 0; display: none;
    background: #000 url('data image4-removebg-preview.png;
  }

  /* ── DESKTOP ICONS ── */
  .desktop-icon {
    position: absolute; display: flex; flex-direction: column; align-items: center;
    width: 72px; cursor: pointer; padding: 4px;
  }
  .desktop-icon:hover .icon-img { outline: 1px dotted #fff; }
  .desktop-icon.selected .icon-label { background: #000080; color: #fff; }
  .desktop-icon.selected .icon-img { outline: 1px dotted #fff; }
  .icon-img {
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin-bottom: 2px; image-rendering: pixelated;
  }
  .icon-label {
    font-size: 11px; color: #fff; text-align: center; text-shadow: 1px 1px 0 #000;
    line-height: 1.2; word-break: break-word; padding: 1px 2px;
  }

  /* Circle icons for coco / vyrq */
  .circle-icon {
    width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; color: #fff; text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
  }

  /* ── TASKBAR ── */
  #taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 28px;
    background: #c0c0c0; border-top: 2px solid #fff;
    display: none; align-items: center; padding: 0 2px; gap: 3px; z-index: 500;
  }
  #start-btn {
    background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
    padding: 2px 8px 2px 6px; font-size: 11px; font-weight: bold; font-family: inherit;

  #start-btn:active { border-color: #808080 #fff #fff #808080; }
  #start-btn img, #start-btn .start-logo { font-size: 14px; }
  .taskbar-divider { width: 2px; height: 20px; border-left: 1px solid #808080; border-right: 1px solid #fff; margin: 0 2px; }
  .taskbar-btn {
    background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff;
    padding: 2px 8px; font-size: 11px; font-family: inherit; cursor: pointer;
    height: 22px; min-width: 80px; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;

  .taskbar-btn.active { border-color: #808080 #fff #fff #808080; background: #b0b0b0; }
  #clock {

  /* ── START MENU ── */

  .sm-item:hover { background: #000080; color: #fff; }

  /* ── WINDOWS ── */
  .win95-window {

  .win95-window.focused { z-index: 200; }

    background: #808080; color: #fff; padding: 3px 4px; display: flex; align-items: center;
    gap: 4px; cursor: move; font-size: 11px; font-weight: bold;
  }
  .win95-window.focused .win-titlebar { background: linear-gradient(90deg, #000080, #1084d0); }
  .win-title-icon { width: 14px; height: 14px; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .win-title-text { flex: 1; }

  .win-ctrl-btn {
    width: 16px; height: 14px; background: #c0c0c0; border: 1px solid;

    font-size: 9px; cursor: pointer; color: #000; font-weight: bold;

  .win-ctrl-btn:active { border-color: #808080 #fff #fff #808080; }
  .win-menubar {
    display: flex; border-bottom: 1px solid #808080; background: #c0c0c0; padding: 1px 0;
  }
  .win-menu-item { padding: 2px 8px; cursor: pointer; font-size: 11px; }
  .win-menu-item:hover { background: #000080; color: #fff; }
  .win-content { flex: 1; overflow: auto; padding: 2px; }
  .win-statusbar {
    border-top: 2px solid; border-color: #808080 #fff #fff #808080;
    padding: 2px 6px; font-size: 10px; color: #444;
  }

  /* ── MY COMPUTER ── */
  .explorer-grid {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: #fff;
    border: 2px solid; border-color: #808080 #fff #fff #808080; margin: 4px;
    min-height: 180px;
  }
  .explorer-icon {
    display: flex; flex-direction: column; align-items: center; width: 64px;
    padding: 4px; cursor: pointer;
  }
  .explorer-icon:hover { background: #000080; color: #fff; }
  .explorer-icon:hover .exp-label { color: #fff; }
  .exp-img { font-size: 28px; margin-bottom: 2px; }
  .exp-label { font-size: 10px; text-align: center; color: #000; word-break: break-word; }

  /* ── FOLDER / TXT WINDOW ── */
  .folder-grid {
    display: flex; flex-wrap: wrap; gap: 6px; padding: 8px; background: #fff;
    border: 2px solid; border-color: #808080 #fff #fff #808080; margin: 4px; min-height: 140px;
  }
  .txt-content {
    background: #fff; border: 2px solid; border-color: #808080 #fff #fff #808080;
    margin: 4px; padding: 6px; font-family: 'Courier New', monospace; font-size: 11px;
    white-space: pre; overflow: auto; flex: 1; color: #000; cursor: default;
    min-height: 200px;
  }

  /* resize handle */
  .win-resize {
    position: absolute; bottom: 0; right: 0; width: 12px; height: 12px; cursor: se-resize;
    background: linear-gradient(135deg, transparent 50%, #808080 50%);
  }

  /* ── SHUTDOWN OVERLAY ── */
  #shutdown {
    position: fixed; inset: 0; background: #000; display: none;
    align-items: center; justify-content: center; z-index: 9000; color: #fff;
    font-size: 24px; flex-direction: column; gap: 12px;
  }
</style>

<script>
// ═══════════════════════ CONFIGURABLE ASCII ART ═══════════════════════
// Edit the content inside each <textarea> tag in the HTML below this script.
// You can paste ANYTHING — symbols, numbers, special chars, no quotes needed.
function getTxtContents() {
  const result = {};
  document.querySelectorAll('script[type="text/plain"]').forEach(el => {
    const key = el.id.replace('art-', '');
    result[key] = el.textContent;
  });
  return result;
}

// ═══════════════════════ BOOT SEQUENCE ═══════════════════════
function showLogin() {
  const l = document.getElementById('login');
  l.style.display = 'flex';
  setTimeout(() => document.getElementById('loginUser').focus(), 100);
}

document.addEventListener('DOMContentLoaded', showLogin);

// ═══════════════════════ LOGIN ═══════════════════════
function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  // Accept anything — user just needs to fill both fields
  if (!u) { alert('Please enter a username.'); return; }
  document.getElementById('login').style.display = 'none';
  showDesktop();
}
function loginCancel() {
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
}
document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

// ═══════════════════════ DESKTOP ═══════════════════════
function showDesktop() {
  document.getElementById('desktop').style.display = 'block';
  document.getElementById('taskbar').style.display = 'flex';
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function selectIcon(el) {
  document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
  el.classList.add('selected');
}
document.getElementById('desktop').addEventListener('click', e => {
  if (e.target === document.getElementById('desktop')) {
    document.querySelectorAll('.desktop-icon').forEach(i => i.classList.remove('selected'));
  }
});

// ═══════════════════════ START MENU ═══════════════════════
function toggleStart() {
  const m = document.getElementById('start-menu');
  m.style.display = m.style.display === 'block' ? 'none' : 'block';
}
document.addEventListener('click', e => {
  if (!e.target.closest('#start-menu') && !e.target.closest('#start-btn')) {
    document.getElementById('start-menu').style.display = 'none';
  }
});

// ═══════════════════════ SHUTDOWN ═══════════════════════
function doShutdown() {
  document.getElementById('start-menu').style.display = 'none';
  document.getElementById('desktop').style.display = 'none';
  document.getElementById('taskbar').style.display = 'none';
  document.getElementById('shutdown').style.display = 'flex';
}
function restartToLogin() {
  // Close all windows
  document.querySelectorAll('.win95-window').forEach(w => w.remove());
  document.getElementById('taskbar-btns').innerHTML = '';
  document.getElementById('shutdown').style.display = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('login').style.display = 'flex';
  setTimeout(() => document.getElementById('loginUser').focus(), 100);
}

// ═══════════════════════ WINDOW SYSTEM ═══════════════════════
let zTop = 200;
let winIdCounter = 0;
const openWindows = {};

function makeWindow({ id, title, icon='📄', x=80, y=50, w=400, h=300, menubar=true }) {
  const win = document.createElement('div');
  win.className = 'win95-window';
  win.id = 'win-' + id;
  // Always keep at least 120px of the right edge (title bar + X) visible on screen
  const screenW = window.innerWidth;
  const clampedX = Math.min(x, screenW - 120);
  win.style.cssText = `left:${clampedX}px;top:${y}px;width:${w}px;height:${h}px;z-index:${++zTop}`;

  win.innerHTML = `
    <div class="win-titlebar" data-winid="${id}">
      <div class="win-title-icon">${icon}</div>
      <div class="win-title-text">${title}</div>
      <div class="win-controls">
        <div class="win-ctrl-btn" onclick="minimizeWin('${id}')">_</div>
        <div class="win-ctrl-btn" onclick="closeWin('${id}')">✕</div>
      </div>
    </div>
    ${menubar ? `<div class="win-menubar">
      <div class="win-menu-item">File</div>
      <div class="win-menu-item">Edit</div>
      <div class="win-menu-item">View</div>
      <div class="win-menu-item">Help</div>
    </div>` : ''}
    <div class="win-content" id="wc-${id}"></div>
    <div class="win-statusbar" id="ws-${id}">Ready</div>
    <div class="win-resize" data-winid="${id}"></div>
  `;

  document.getElementById('desktop').appendChild(win);
  makeDraggable(win, win.querySelector('.win-titlebar'));
  makeResizable(win, win.querySelector('.win-resize'));
  focusWin(id, win);
  addTaskbarBtn(id, icon + ' ' + title);
  openWindows[id] = { win, title, icon, minimized: false };
  return win;
}

function focusWin(id, win) {
  document.querySelectorAll('.win95-window').forEach(w => w.classList.remove('focused'));
  (win || document.getElementById('win-' + id)).classList.add('focused');
  (win || document.getElementById('win-' + id)).style.zIndex = ++zTop;
  document.querySelectorAll('.taskbar-btn').forEach(b => b.classList.remove('active'));
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.classList.add('active');
}

function closeWin(id) {
  const w = document.getElementById('win-' + id);
  if (w) w.remove();
  const tb = document.getElementById('tb-' + id);
  if (tb) tb.remove();
  delete openWindows[id];
}

function minimizeWin(id) {
  const w = document.getElementById('win-' + id);
  if (!w) return;
  if (openWindows[id].minimized) {
    w.style.display = 'flex';
    openWindows[id].minimized = false;
    focusWin(id);
  } else {
    w.style.display = 'none';
    openWindows[id].minimized = true;
  }
}

function addTaskbarBtn(id, label) {
  const btn = document.createElement('button');
  btn.className = 'taskbar-btn active';
  btn.id = 'tb-' + id;
  btn.textContent = label;
  btn.onclick = () => {
    const info = openWindows[id];
    if (!info) return;
    if (info.minimized) {
      minimizeWin(id);
    } else {
      focusWin(id);
    }
  };
  document.getElementById('taskbar-btns').appendChild(btn);
}

// ─── DRAG ───
function makeDraggable(win, handle) {
  let ox, oy, dragging = false;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-ctrl-btn')) return;
    dragging = true;
    ox = e.clientX - win.offsetLeft;
    oy = e.clientY - win.offsetTop;
    focusWin(win.id.replace('win-',''), win);
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = Math.max(0, e.clientX - ox) + 'px';
    win.style.top = Math.max(0, e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', () => dragging = false);
  win.addEventListener('mousedown', () => focusWin(win.id.replace('win-',''), win));
}

// ─── RESIZE ───
function makeResizable(win, handle) {
  let resizing = false, startX, startY, startW, startH;
  handle.addEventListener('mousedown', e => {
    resizing = true;
    startX = e.clientX; startY = e.clientY;
    startW = win.offsetWidth; startH = win.offsetHeight;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    win.style.width = Math.max(200, startW + e.clientX - startX) + 'px';
    win.style.height = Math.max(120, startH + e.clientY - startY) + 'px';
  });
  document.addEventListener('mouseup', () => resizing = false);
}

// ═══════════════════════ MY COMPUTER ═══════════════════════
function openMyComputer() {
  document.getElementById('start-menu').style.display = 'none';
  const id = 'mycomp';

  const win = makeWindow({ id, title: 'My Computer', icon: '🖥️', x: 100, y: 60, w: 420, h: 300 });

  const grid = document.getElementById('mcGrid');

  const items = [

    { label: 'Local Disk (C:)', icon: '🗄️' },
    { label: 'CD-ROM (D:)', icon: '💿' },
    { label: 'Control Panel', icon: '🔧' },
    { label: 'Printers', icon: '🖨️' },
  ];
  items.forEach(it => {
    const d = document.createElement('div');
    d.className = 'explorer-icon';
    d.innerHTML = `<div class="exp-img">${it.icon}</div><div class="exp-label">${it.label}</div>`;
    grid.appendChild(d);

  document.getElementById('ws-' + id).textContent = items.length + ' object(s)';
}

// ═══════════════════════ CIRCLE ICON LINKS ═══════════════════════
// ── Change these URLs to whatever you want ──
const CIRCLE_LINKS = {
  coco: 'https://doxi.ng/coco',   // <-- replace with real link
  vyrq: 'https://guns.lol/vyrq',   // <-- replace with real link
};

function openCircleLink(name) {
  const url = CIRCLE_LINKS[name];
  // Remove any existing dialog
  const old = document.getElementById('link-dialog');
  if (old) old.remove();

  const dlg = document.createElement('div');
  dlg.id = 'link-dialog';

    position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);

    box-shadow:2px 2px 0 #000; z-index:9999; width:340px; font-family:'MS Sans Serif',Arial,sans-serif; font-size:11px;
  `;
